<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart</title>
<link rel="stylesheet" href="/static/css/style.css?v=5000">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

<div class="app-page">
<h1 class="app-title">CART</h1>

<div id="cart-list"></div>

<div id="empty-cart" class="empty-box">
Cart is empty
</div>

<div class="card">
<h2>Delivery</h2>

<form id="order-form" action="/create-order" method="POST">

<input type="hidden" name="items" id="order-items">
<input type="hidden" name="payment" id="payment-method">
<input type="hidden" name="telegram_id" id="telegram-id">

<input class="input" name="full_name" placeholder="Full name" required>
<input class="input" name="phone" placeholder="Phone / Telegram" required>
<input class="input" name="country" placeholder="Country" required>
<input class="input" name="city" placeholder="City" required>
<input class="input" name="address" placeholder="Address" required>
<input class="input" name="postal_code" placeholder="Postal code">

<textarea name="comment" placeholder="Comment for seller"></textarea>

<div class="total">
Total: €<span id="cart-total">0</span>
</div>

<button type="button" class="btn" onclick="checkout('card')">
Pay by Card
</button>

<button type="button" class="btn dark" onclick="checkout('crypto')">
Pay by Crypto
</button>

<button type="button" class="btn red" onclick="clearCart()">
Clear Cart
</button>

</form>
</div>
</div>

{% include "_nav.html" %}

<script>
const tg = window.Telegram?.WebApp;

if(tg){
    tg.ready();
    tg.expand();

    const user = tg.initDataUnsafe?.user;
    if(user){
        document.getElementById("telegram-id").value = user.id;
    }
}

function getCart(){
    return JSON.parse(localStorage.getItem("cart") || "[]");
}

function saveCart(cart){
    localStorage.setItem("cart", JSON.stringify(cart));
}

function renderCart(){
    const cart = getCart();
    const list = document.getElementById("cart-list");
    const empty = document.getElementById("empty-cart");
    const totalEl = document.getElementById("cart-total");

    list.innerHTML = "";

    if(cart.length === 0){
        empty.style.display = "block";
        totalEl.innerText = "0";
        return;
    }

    empty.style.display = "none";

    let total = 0;

    cart.forEach((item, index) => {
        const qty = item.qty || 1;
        const price = Number(item.price || 0);
        total += price * qty;

        list.innerHTML += `
            <div class="card" style="display:flex;gap:14px;align-items:center;margin-bottom:14px;">
                <img src="${item.image || ""}" style="width:90px;height:90px;object-fit:cover;border-radius:18px;">
                <div style="flex:1;">
                    <div style="font-weight:900;font-size:18px;">${item.name}</div>
                    <div style="color:#9fa8bd;font-size:14px;">${item.brand || ""} ${item.size ? "· " + item.size : ""}</div>
                    <div style="color:#3ea6ff;font-weight:900;font-size:20px;">€${price}</div>

                    <div style="display:flex;gap:8px;margin-top:8px;align-items:center;">
                        <button type="button" onclick="changeQty(${index}, -1)" style="width:34px;height:34px;border-radius:10px;background:#0d1220;color:white;border:none;">−</button>
                        <span>${qty}</span>
                        <button type="button" onclick="changeQty(${index}, 1)" style="width:34px;height:34px;border-radius:10px;background:#0d1220;color:white;border:none;">+</button>
                    </div>
                </div>

                <button type="button" onclick="removeItem(${index})" style="width:38px;height:38px;border-radius:12px;background:#ff4d6d;color:white;border:none;">×</button>
            </div>
        `;
    });

    totalEl.innerText = total;
}

function changeQty(index, delta){
    const cart = getCart();
    cart[index].qty = (cart[index].qty || 1) + delta;

    if(cart[index].qty <= 0){
        cart.splice(index, 1);
    }

    saveCart(cart);
    renderCart();
}

function removeItem(index){
    const cart = getCart();
    cart.splice(index, 1);
    saveCart(cart);
    renderCart();
}

function clearCart(){
    localStorage.removeItem("cart");
    renderCart();
}

function checkout(method){
    const cart = getCart();

    if(cart.length === 0){
        alert("Cart is empty");
        return;
    }

    document.getElementById("payment-method").value = method;
    document.getElementById("order-items").value = JSON.stringify(cart);

    localStorage.removeItem("cart");
    document.getElementById("order-form").submit();
}

renderCart();
</script>
<script>
function applyGlobalLang(){
    const lang = localStorage.getItem("lang") || "ru";

    document.querySelectorAll("[data-ru][data-en]").forEach(el => {
        el.innerText = el.dataset[lang];
    });
}

applyGlobalLang();
</script>
</body>
</html>
