<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart</title>
<link rel="stylesheet" href="/static/css/style.css?v=3000">

<style>
.cart-page{
    min-height:100vh;
    padding:28px 22px 135px;
}

.cart-title{
    font-size:48px;
    font-weight:900;
    color:#3ea6ff;
    margin-bottom:24px;
    letter-spacing:-1px;
}

.cart-empty-card{
    background:linear-gradient(180deg,#121c33,#0d1426);
    border:1px solid rgba(255,255,255,.08);
    border-radius:30px;
    padding:30px 22px;
    margin-bottom:24px;
    box-shadow:0 20px 60px rgba(0,0,0,.35);
}

.cart-empty-icon{
    width:84px;
    height:84px;
    border-radius:50%;
    background:#3ea6ff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:42px;
    margin-bottom:18px;
    box-shadow:0 0 34px rgba(62,166,255,.75);
}

.cart-empty-text{
    font-size:22px;
    font-weight:800;
    margin-bottom:8px;
}

.cart-empty-sub{
    color:#9fa8bd;
    font-size:15px;
    line-height:1.45;
}

.checkout-card{
    background:linear-gradient(180deg,#121c33,#0d1426);
    border:1px solid rgba(255,255,255,.08);
    border-radius:30px;
    padding:24px;
    box-shadow:0 20px 60px rgba(0,0,0,.35);
}

.total-row{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    margin-bottom:22px;
}

.total-label{
    color:#9fa8bd;
    font-size:15px;
    font-weight:700;
}

.total-price{
    font-size:40px;
    font-weight:900;
    color:white;
}

.total-price span{
    color:#3ea6ff;
}

.pay-grid{
    display:grid;
    gap:12px;
}

.cart-btn{
    min-height:58px;
    border-radius:20px;
    border:none;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:17px;
    font-weight:900;
    text-decoration:none;
}

.cart-btn.blue{
    background:#3ea6ff;
    box-shadow:0 14px 30px rgba(62,166,255,.28);
}

.cart-btn.dark{
    background:#0b1020;
    border:1px solid rgba(62,166,255,.85);
}

.cart-btn.red{
    background:#ff4d6d;
    box-shadow:0 14px 30px rgba(255,77,109,.22);
}

.safe-note{
    margin-top:18px;
    background:#0b1020;
    border-radius:18px;
    padding:14px;
    color:#9fa8bd;
    font-size:14px;
    line-height:1.4;
}
</style>
</head>

<body>

<div class="cart-page">

    <h1 class="cart-title">CART</h1>

    <div class="cart-empty-card">
        <div class="cart-empty-icon">🛒</div>

        <div class="cart-empty-text">
            Cart is empty
        </div>

        <div class="cart-empty-sub">
            Добавь товары из каталога, и они появятся здесь перед оплатой.
        </div>
    </div>

    <div class="checkout-card">

        <div class="total-row">
            <div>
                <div class="total-label">ORDER TOTAL</div>
                <div class="total-price"><span>$</span>0</div>
            </div>

            <div style="font-size:34px;">💎</div>
        </div>

        <div class="pay-grid">
            <a href="/pay-card" class="cart-btn blue">Pay by Card</a>
            <a href="/pay-crypto" class="cart-btn dark">Pay by Crypto</a>
            <button class="cart-btn red">Clear Cart</button>
        </div>

        <div class="safe-note">
            🔒 Secure checkout. После оформления заказа админ получит уведомление.
        </div>

    </div>

</div>

{% include "_nav.html" %}

</body>
</html>
