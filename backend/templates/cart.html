<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart</title>
<link rel="stylesheet" href="/static/css/style.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
.old-bottom-nav,
.bottom-nav,
.navbar{
display:none!important;
}

.premium-bottom-nav{
position:fixed!important;
bottom:0!important;
left:50%!important;
transform:translateX(-50%)!important;
width:100%!important;
max-width:900px!important;
height:105px!important;
background:rgba(17,24,39,.96)!important;
backdrop-filter:blur(20px)!important;
border-top-left-radius:34px!important;
border-top-right-radius:34px!important;
display:flex!important;
align-items:center!important;
justify-content:space-around!important;
padding:8px 12px!important;
z-index:999999!important;
box-shadow:0 -10px 40px rgba(0,0,0,.45)!important;
border:1px solid rgba(255,255,255,.06)!important;
}

.premium-nav-item{
display:flex!important;
flex-direction:column!important;
align-items:center!important;
justify-content:center!important;
gap:5px!important;
text-decoration:none!important;
color:#8d94a8!important;
font-size:13px!important;
font-weight:700!important;
min-width:58px!important;
}

.premium-nav-item.active{
color:#3ea6ff!important;
}

.premium-icon{
font-size:28px!important;
line-height:1!important;
}

.premium-shop-btn{
position:relative!important;
margin-top:-45px!important;
display:flex!important;
flex-direction:column!important;
align-items:center!important;
text-decoration:none!important;
color:#8d94a8!important;
font-size:12px!important;
font-weight:800!important;
min-width:82px!important;
}

.premium-shop-circle{
width:88px!important;
height:88px!important;
border-radius:50%!important;
background:#3ea6ff!important;
display:flex!important;
align-items:center!important;
justify-content:center!important;
font-size:42px!important;
color:white!important;
border:8px solid #050816!important;
box-shadow:0 0 35px rgba(62,166,255,.85)!important;
margin-bottom:5px!important;
}

body{
padding-bottom:130px!important;
}
@media(max-width:600px){

.premium-bottom-nav{
width:100%!important;
max-width:100%!important;
left:0!important;
transform:none!important;
height:86px!important;
border-radius:24px 24px 0 0!important;
padding:4px 2px!important;
overflow:hidden!important;
}

.premium-nav-item{
min-width:40px!important;
font-size:9px!important;
gap:3px!important;
}

.premium-icon{
font-size:20px!important;
}

.premium-shop-btn{
min-width:54px!important;
font-size:9px!important;
margin-top:-32px!important;
}

.premium-shop-circle{
width:66px!important;
height:66px!important;
font-size:30px!important;
border:6px solid #050816!important;
}

}
</style>
</head>

<body>

<div class="topbar">
<h1>CART</h1>
<a href="/my-shop" class="premium-shop-btn">
    <div class="premium-shop-circle">💎</div>
    <span>Shop</span>
</a>
</div>

<div id="cart-list" class="cart-list"></div>

<div class="cart-total-box">
<h2>Total: $<span id="cart-total">0</span></h2>

<form id="order-form" action="/create-order" method="POST">
<input type="hidden" name="items" id="order-items">
<input type="hidden" name="payment" id="payment-method">
<input type="hidden" name="telegram_id" id="telegram-id">

<button type="button" class="buy-btn" onclick="checkout('card')">
Pay by Card
</button>

<button type="button" class="buy-btn crypto" onclick="checkout('crypto')">
Pay by Crypto
</button>
</form>

<button class="clear-cart-btn" onclick="clearCart()">Clear Cart</button>
</div>

<div class="premium-bottom-nav">

    <a href="/" class="premium-nav-item">
        <div class="premium-icon">🏠</div>
        <span>Главная</span>
    </a>

    <a href="/cart" class="premium-nav-item active">
        <div class="premium-icon">🛒</div>
        <span>Корзина</span>
    </a>

    <a href="/favorites-products" class="premium-nav-item">
        <a href="/catalog" class="premium-nav-item">
    <div class="premium-icon">📁</div>
    <span>Каталог</span>
</a>
        <span>Каталог</span>
    </a>

    <a href="/my-shop" class="premium-shop-btn">
        <div class="premium-shop-circle">💎</div>
        <span>ReversedShop</span>
    </a>

    <a href="/chat" class="premium-nav-item">
        <div class="premium-icon">💬</div>
        <span>Чат</span>
    </a>

    <a href="/vip" class="premium-nav-item">
        <div class="premium-icon">👑</div>
        <span>Вип</span>
    </a>

    <a href="/profile" class="premium-nav-item">
        <div class="premium-icon">👤</div>
        <span>Профиль</span>
    </a>

</div>

<script>
const tg = window.Telegram?.WebApp;

if(tg){
    tg.ready();
    tg.expand();
}

let cart = JSON.parse(localStorage.getItem("cart") || "[]");
const list = document.getElementById("cart-list");
const totalEl = document.getElementById("cart-total");

function renderCart(){
    list.innerHTML = "";
    let total = 0;

    if(cart.length === 0){
        list.innerHTML = "<div class='empty-cart'>Cart is empty</div>";
    }

    cart.forEach((item, index) => {
        total += Number(item.price);

        list.innerHTML += `
            <div class="cart-item">
                <img src="${item.image}">
                <div>
                    <h3>${item.name}</h3>
                    <p>$${item.price}</p>
                    <button onclick="removeItem(${index})">Remove</button>
                </div>
            </div>
        `;
    });

    totalEl.innerText = total;
}

function removeItem(index){
    cart.splice(index, 1);
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
}

function clearCart(){
    localStorage.removeItem("cart");
    cart = [];
    renderCart();
}

function checkout(method){
    if(cart.length === 0){
        alert("Cart is empty");
        return;
    }

    document.getElementById("order-items").value = JSON.stringify(cart);
    document.getElementById("payment-method").value = method;

    const userId = tg?.initDataUnsafe?.user?.id || "";
    document.getElementById("telegram-id").value = userId;

    localStorage.removeItem("cart");
    document.getElementById("order-form").submit();
}

renderCart();
</script>

</body>
</html>
