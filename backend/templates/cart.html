<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

<div class="topbar">
<h1>CART</h1>
<a href="/">🏠</a>
</div>

<div id="cart-list" class="cart-list"></div>

<div class="cart-total-box">
<h2>Total: $<span id="cart-total">0</span></h2>

<form id="order-form" action="/create-order" method="POST">
<input type="hidden" name="items" id="order-items">
<input type="hidden" name="payment" id="payment-method">
<input type="hidden" name="telegram_id" id="telegram-id">

<button type="button" class="buy-btn" onclick="checkout('card')">
Pay by Card
</button>

<button type="button" class="buy-btn crypto" onclick="checkout('crypto')">
Pay by Crypto
</button>
</form>

<button class="clear-cart-btn" onclick="clearCart()">Clear Cart</button>
</div>

<div class="bottom-nav">
<a href="/" class="nav-item"><div>🏠</div><span>HOME</span></a>
<a href="/my-shop" class="nav-item"><div>🏪</div><span>MY SHOP</span></a>
<a href="/chat" class="nav-item"><div>💬</div><span>CHAT</span></a>
<a href="/cart" class="nav-item active"><div>🛒</div><span>CART</span></a>
<a href="/profile" class="nav-item"><div>👤</div><span>LOGIN</span></a>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart") || "[]");
const list = document.getElementById("cart-list");
const totalEl = document.getElementById("cart-total");

function renderCart(){
    list.innerHTML = "";
    let total = 0;

    if(cart.length === 0){
        list.innerHTML = "<div class='empty-cart'>Cart is empty</div>";
    }

    cart.forEach((item, index) => {
        total += Number(item.price);

        list.innerHTML += `
            <div class="cart-item">
                <img src="${item.image}">
                <div>
                    <h3>${item.name}</h3>
                    <p>$${item.price}</p>
                    <button onclick="removeItem(${index})">Remove</button>
                </div>
            </div>
        `;
    });

    totalEl.innerText = total;
}

function removeItem(index){
    cart.splice(index, 1);
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
}

function clearCart(){
    localStorage.removeItem("cart");
    cart = [];
    renderCart();
}

function checkout(method){
    if(cart.length === 0){
        alert("Cart is empty");
        return;
    }

    document.getElementById("order-items").value = JSON.stringify(cart);
    document.getElementById("payment-method").value = method;

    const tg = window.Telegram?.WebApp;
    const userId = tg?.initDataUnsafe?.user?.id || "";
    document.getElementById("telegram-id").value = userId;

    localStorage.removeItem("cart");
    document.getElementById("order-form").submit();
}

renderCart();
</script>

</body>
</html>
