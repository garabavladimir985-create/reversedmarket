<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ product.name }}</title>
<link rel="stylesheet" href="/static/css/style.css?v=4000">

<style>
.product-page{
    min-height:100vh;
    padding:24px 20px 135px;
}

.product-img{
    width:100%;
    height:420px;
    object-fit:cover;
    border-radius:30px;
    background:#111827;
    margin-bottom:20px;
}

.product-card-box{
    background:linear-gradient(180deg,#121c33,#0d1426);
    border:1px solid rgba(255,255,255,.08);
    border-radius:30px;
    padding:22px;
}

.product-title{
    font-size:32px;
    font-weight:900;
    margin-bottom:8px;
}

.product-price-big{
    color:#3ea6ff;
    font-size:34px;
    font-weight:900;
    margin-bottom:18px;
}

.meta-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-bottom:18px;
}

.meta{
    background:#0d1220;
    padding:13px;
    border-radius:16px;
    color:#c9d2e3;
    font-size:14px;
}

.desc{
    color:#c9d2e3;
    line-height:1.5;
    margin-bottom:18px;
}
</style>
</head>

<body>

<div class="product-page">

    {% if product.image %}
    <img class="product-img" src="{{ product.image }}">
    {% endif %}

    <div class="product-card-box">

        <div class="product-title">{{ product.name }}</div>

        <div class="product-price-big">€{{ product.price }}</div>

        <div class="meta-grid">
            <div class="meta">Brand: {{ product.brand }}</div>
            <div class="meta">Size: {{ product.size }}</div>
            <div class="meta">Color: {{ product.color }}</div>
            <div class="meta">Condition: {{ product.condition }}</div>
        </div>

        <div class="desc">
            {{ product.description }}
        </div>

        <button class="btn" onclick="addToCart()">
            Add to Cart
        </button>

        <a href="/cart" class="btn dark">
            Go to Cart
        </a>

    </div>

</div>

{% include "_nav.html" %}

<script>
function addToCart(){
    const item = {
        id: "{{ product.id }}",
        name: "{{ product.name }}",
        price: Number("{{ product.price }}"),
        image: "{{ product.image }}",
        brand: "{{ product.brand }}",
        size: "{{ product.size }}"
    };

    let cart = JSON.parse(localStorage.getItem("cart") || "[]");

    const exists = cart.find(x => String(x.id) === String(item.id));

    if(exists){
        exists.qty = (exists.qty || 1) + 1;
    }else{
        item.qty = 1;
        cart.push(item);
    }

    localStorage.setItem("cart", JSON.stringify(cart));

    alert("Added to cart");
}
</script>

</body>
</html>
