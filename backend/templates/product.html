<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ product.name }}</title>
<link rel="stylesheet" href="/static/css/style.css?v=7000">

<style>
.product-page{
    min-height:100vh;
    padding:24px 20px 135px;
}

.product-img{
    width:100%;
    height:420px;
    object-fit:cover;
    border-radius:30px;
    background:#111827;
    margin-bottom:20px;
}

.product-card-box{
    background:linear-gradient(180deg,#121c33,#0d1426);
    border:1px solid rgba(255,255,255,.08);
    border-radius:30px;
    padding:22px;
}

.product-top{
    display:flex;
    justify-content:space-between;
    gap:14px;
    align-items:flex-start;
}

.product-title{
    font-size:32px;
    font-weight:900;
    margin-bottom:8px;
}

.product-price-big{
    color:#3ea6ff;
    font-size:34px;
    font-weight:900;
    margin-bottom:18px;
}

.product-fav{
    width:54px;
    height:54px;
    border:none;
    border-radius:18px;
    background:#0d1220;
    color:white;
    font-size:26px;
}

.product-fav.active{
    background:#3ea6ff;
}

.meta-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-bottom:18px;
}

.meta{
    background:#0d1220;
    padding:13px;
    border-radius:16px;
    color:#c9d2e3;
    font-size:14px;
}

.desc{
    color:#c9d2e3;
    line-height:1.5;
    margin-bottom:18px;
}
</style>
</head>

<body>

<div class="product-page">

    {% if product.image %}
    <img class="product-img" src="{{ product.image }}">
    {% endif %}

    <div class="product-card-box">

        <div class="product-top">
            <div>
                <div class="product-title">{{ product.name }}</div>
                <div class="product-price-big">€{{ product.price }}</div>
            </div>

            <button class="product-fav" id="fav-btn" onclick="toggleFavorite()">
                ♡
            </button>
        </div>

        <div class="meta-grid">
            <div class="meta">Brand: {{ product.brand }}</div>
            <div class="meta">Size: {{ product.size }}</div>
            <div class="meta">Color: {{ product.color }}</div>
            <div class="meta">Condition: {{ product.condition }}</div>
        </div>

        <div class="desc">
            {{ product.description }}
        </div>

        <button class="btn" onclick="addToCart()">
            Add to Cart
        </button>

        <a href="/cart" class="btn dark">
            Go to Cart
        </a>

    </div>

</div>

{% include "_nav.html" %}

<script>
const item = {
    id: "{{ product.id }}",
    name: "{{ product.name }}",
    price: Number("{{ product.price }}"),
    image: "{{ product.image }}",
    brand: "{{ product.brand }}",
    size: "{{ product.size }}"
};

function addToCart(){
    let cart = JSON.parse(localStorage.getItem("cart") || "[]");
    const exists = cart.find(x => String(x.id) === String(item.id));

    if(exists){
        exists.qty = (exists.qty || 1) + 1;
    }else{
        item.qty = 1;
        cart.push(item);
    }

    localStorage.setItem("cart", JSON.stringify(cart));
    alert("Added to cart");
}

function getFavorites(){
    return JSON.parse(localStorage.getItem("favorites") || "[]");
}

function saveFavorites(favs){
    localStorage.setItem("favorites", JSON.stringify(favs));
}

function toggleFavorite(){
    let favs = getFavorites();
    const exists = favs.find(x => String(x.id) === String(item.id));

    if(exists){
        favs = favs.filter(x => String(x.id) !== String(item.id));
    }else{
        favs.push(item);
    }

    saveFavorites(favs);
    updateFavoriteButton();
}

function updateFavoriteButton(){
    const favs = getFavorites();
    const exists = favs.find(x => String(x.id) === String(item.id));
    const btn = document.getElementById("fav-btn");

    if(exists){
        btn.innerText = "❤️";
        btn.classList.add("active");
    }else{
        btn.innerText = "♡";
        btn.classList.remove("active");
    }
}

updateFavoriteButton();
</script>
<script>
function applyGlobalLang(){
    const lang = localStorage.getItem("lang") || "ru";

    document.querySelectorAll("[data-ru][data-en]").forEach(el => {
        el.innerText = el.dataset[lang];
    });
}

applyGlobalLang();
</script>
<script src="/static/js/lang.js?v=1"></script>
</body>
</html>
