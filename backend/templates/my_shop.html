<!DOCTYPE html>
<html>
<head>
<title>My Shop</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="topbar">
<h1>MY SHOP</h1>
<a href="/">🏠</a>
</div>

<div class="admin-box">
<h2>Create My Shop</h2>

<form action="/add-seller" method="POST" enctype="multipart/form-data">
<input name="shop_name" placeholder="Shop name" required>
<input name="category" placeholder="Category" required>
<input name="telegram" placeholder="Telegram username">
<input name="avatar" placeholder="Shop image URL">
<input type="file" name="avatar_file">
<textarea name="description" placeholder="Shop description"></textarea>
<button type="submit">Create Shop</button>
</form>
</div>

<div class="admin-box">
<h2>Add Item</h2>

<form action="/add-seller-product" method="POST" enctype="multipart/form-data">

<select name="seller_id" required>
{% for seller in sellers %}
<option value="{{ seller.id }}">{{ seller.shop_name }}</option>
{% endfor %}
</select>

<input name="name" placeholder="Item name" required>
<input name="price" placeholder="Price" required>
<input name="brand" placeholder="Brand">
<input name="size" placeholder="Size">
<input name="color" placeholder="Color">
<input name="condition" placeholder="Condition">
<input name="stock" placeholder="Stock" value="1">
<input name="image" placeholder="Image URL">
<input type="file" name="image_file">
<textarea name="description" placeholder="Description"></textarea>

<label class="vip-check">
<input type="checkbox" name="vip"> VIP item
</label>

<button type="submit">Add Item</button>
</form>
</div>

<div class="admin-box">
<h2>My Shops</h2>

{% for seller in sellers %}
<div class="order-card">
<h3>{{ seller.shop_name }}</h3>
<p>{{ seller.description }}</p>
<p>Category: {{ seller.category }}</p>
<a class="pay-btn" href="/shop/{{ seller.id }}">Open Shop</a>
<a class="pay-btn" href="/delete-seller/{{ seller.id }}">Delete Shop</a>
</div>
{% endfor %}
</div>

<div class="admin-box">
<h2>My Items</h2>

{% for product in products %}
<div class="admin-item">
<span>{{ product.name }} — ${{ product.price }}</span>
<a href="/delete-product/{{ product.id }}">Delete</a>
</div>
{% endfor %}
</div>

<a class="my-shop-float" href="/my-shop">🏪</a>

</body>
</html>
