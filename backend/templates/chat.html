<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chat</title>

<link rel="stylesheet" href="/static/css/style.css?v=999">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
background:#050816;
color:white;
font-family:Arial;
margin:0;
padding-bottom:150px;
overflow-x:hidden;
}

.bottom-nav,
.navbar,
.old-bottom-nav{
display:none!important;
}

.chat-page{
padding:26px;
padding-bottom:160px;
box-sizing:border-box;
}

.chat-title{
font-size:62px;
font-weight:900;
color:#3ea6ff;
margin-bottom:34px;
line-height:1;
}

.chat-box{
background:#111827;
border-radius:30px;
padding:22px;
min-height:520px;
border:1px solid rgba(255,255,255,.08);
box-shadow:0 0 25px rgba(0,0,0,.25);
}

.message{
background:#0d1220;
border-radius:22px;
padding:20px;
margin-bottom:14px;
font-size:22px;
}

.message strong{
color:#3ea6ff;
}

.message img{
width:100%;
max-height:260px;
object-fit:cover;
border-radius:18px;
margin-top:12px;
}

.chat-form{
position:relative;
background:#111827;
border-radius:30px;
padding:20px;
margin-top:24px;
border:1px solid rgba(255,255,255,.08);
box-shadow:0 0 25px rgba(0,0,0,.25);
z-index:3;
}

.chat-form textarea{
width:100%;
min-height:145px;
padding:22px;
border:none;
border-radius:24px;
background:#0d1220;
color:white;
font-size:22px;
box-sizing:border-box;
resize:none;
outline:none;
margin-bottom:18px;
}

.file-box{
background:#0d1220;
border-radius:22px;
padding:18px;
margin-bottom:18px;
font-size:18px;
}

.chat-form button{
width:100%;
height:62px;
border:none;
border-radius:22px;
background:#3ea6ff;
color:white;
font-size:22px;
font-weight:900;
}

.premium-bottom-nav{
position:fixed!important;
left:0!important;
right:0!important;
bottom:0!important;
width:100%!important;
height:104px!important;
background:rgba(17,24,39,.98)!important;
backdrop-filter:blur(24px)!important;
border-radius:30px 30px 0 0!important;
display:flex!important;
align-items:center!important;
justify-content:space-evenly!important;
padding:6px 4px!important;
z-index:9999999!important;
box-shadow:0 -12px 45px rgba(0,0,0,.75)!important;
border:1px solid rgba(255,255,255,.08)!important;
box-sizing:border-box!important;
overflow:visible!important;
}

.premium-nav-item{
width:50px!important;
min-width:50px!important;
display:flex!important;
flex-direction:column!important;
align-items:center!important;
justify-content:center!important;
text-decoration:none!important;
color:#8d94a8!important;
font-size:12px!important;
font-weight:900!important;
gap:5px!important;
line-height:1!important;
}

.premium-nav-item.active{
color:#3ea6ff!important;
}

.premium-icon{
font-size:28px!important;
line-height:1!important;
}

.premium-shop-btn{
width:76px!important;
min-width:76px!important;
margin-top:-48px!important;
display:flex!important;
flex-direction:column!important;
align-items:center!important;
justify-content:center!important;
text-decoration:none!important;
color:#8d94a8!important;
font-size:11px!important;
font-weight:900!important;
gap:4px!important;
line-height:1!important;
}

.premium-shop-circle{
width:78px!important;
height:78px!important;
border-radius:50%!important;
background:#3ea6ff!important;
display:flex!important;
align-items:center!important;
justify-content:center!important;
font-size:36px!important;
border:7px solid #050816!important;
box-shadow:0 0 38px rgba(62,166,255,.95)!important;
}

@media(max-width:600px){
.chat-page{
padding:26px 20px 175px;
}

.chat-title{
font-size:58px;
}

.chat-box{
min-height:560px;
padding:22px;
}

.message{
font-size:21px;
padding:20px;
}

.chat-form{
margin-top:24px;
padding:20px;
}

.chat-form textarea{
font-size:21px;
min-height:145px;
}

.premium-bottom-nav{
height:104px!important;
}

.premium-shop-circle{
width:78px!important;
height:78px!important;
font-size:36px!important;
}
}
</style>
</head>

<body>

<div class="chat-page">

<div class="chat-title">
CHAT
</div>

<div class="chat-box">

{% if messages|length == 0 %}
<div class="message">
No messages yet
</div>
{% endif %}

{% for message in messages %}
<div class="message">
<strong>{{ message.sender }}</strong>
<p>{{ message.text }}</p>

{% if message.image %}
<img src="{{ message.image }}">
{% endif %}
</div>
{% endfor %}

</div>

<form class="chat-form" method="POST" enctype="multipart/form-data">

<input type="hidden" name="sender" id="sender-name" value="Telegram User">

<textarea name="text" placeholder="Message..."></textarea>

<div class="file-box">
<input type="file" name="image_file">
</div>

<button type="submit">
Send
</button>

</form>



<script>
const tg = window.Telegram?.WebApp;

if(tg){
    tg.ready();
    tg.expand();

    const user = tg.initDataUnsafe?.user;

    if(user){
        const name = user.username
            ? "@" + user.username
            : (user.first_name || "Telegram User");

        document.getElementById("sender-name").value = name;
    }
}
</script>

{% include "_nav.html" %}
</body>
</html>
