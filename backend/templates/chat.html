<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chat</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b1020;
color:white;
padding-bottom:120px;
}

.chat-header{
position:fixed;
top:0;
left:0;
right:0;
height:74px;
background:rgba(11,16,32,.92);
backdrop-filter:blur(20px);
display:flex;
align-items:center;
padding:0 18px;
z-index:1000;
border-bottom:1px solid rgba(255,255,255,.05);
}

.chat-title{
font-size:22px;
font-weight:900;
margin-left:12px;
}

.chat-sub{
opacity:.6;
font-size:13px;
margin-top:2px;
}

.chat-body{
padding:95px 14px 120px;
display:flex;
flex-direction:column;
gap:16px;
}

.msg{
display:flex;
align-items:flex-end;
gap:10px;
max-width:100%;
animation:fade .25s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(8px);
}
to{
opacity:1;
transform:none;
}
}

.avatar{
width:42px;
height:42px;
border-radius:50%;
object-fit:cover;
background:#1f2937;
border:2px solid rgba(255,255,255,.1);
}

.bubble{
background:#172036;
border-radius:22px;
padding:12px;
max-width:78%;
position:relative;
box-shadow:0 8px 30px rgba(0,0,0,.25);
}

.username{
font-size:14px;
font-weight:800;
color:#53a8ff;
margin-bottom:6px;
}

.text{
font-size:16px;
line-height:1.45;
word-break:break-word;
}

.msg-image{
width:100%;
border-radius:18px;
margin-top:10px;
}

.time{
font-size:11px;
opacity:.5;
text-align:right;
margin-top:8px;
}

.chat-input-wrap{
position:fixed;
bottom:0;
left:0;
right:0;
padding:14px;
background:rgba(11,16,32,.95);
backdrop-filter:blur(25px);
border-top:1px solid rgba(255,255,255,.06);
z-index:1000;
}

.chat-form{
display:flex;
align-items:center;
gap:10px;
background:#172036;
padding:10px;
border-radius:24px;
}

.attach{
width:44px;
height:44px;
border-radius:50%;
border:none;
background:#24314d;
color:white;
font-size:20px;
}

.chat-input{
flex:1;
background:none;
border:none;
outline:none;
color:white;
font-size:16px;
}

.send-btn{
width:46px;
height:46px;
border:none;
border-radius:50%;
background:#3ea6ff;
color:white;
font-size:18px;
font-weight:900;
}

.hidden{
display:none;
}

.empty{
opacity:.5;
text-align:center;
padding:60px 20px;
}

</style>
</head>

<body>

<div class="chat-header">

<img
src="https://cdn-icons-png.flaticon.com/512/5968/5968776.png"
class="avatar"
>

<div>
<div class="chat-title">{{ shop }}</div>
<div class="chat-sub">Telegram style chat</div>
</div>

</div>

<div class="chat-body">

{% if messages|length == 0 %}
<div class="empty">
No messages yet
</div>
{% endif %}

{% for msg in messages %}

<div class="msg">

<img
class="avatar"
src="https://api.dicebear.com/7.x/thumbs/svg?seed={{ msg.sender }}"
>

<div class="bubble">

<div class="username">
{{ msg.sender }}
</div>

<div class="text">
{{ msg.text }}
</div>

{% if msg.image %}
<img
src="{{ msg.image }}"
class="msg-image"
>
{% endif %}

<div class="time">
{{ msg.created_at.strftime('%H:%M') }}
</div>

</div>

</div>

{% endfor %}

</div>

<div class="chat-input-wrap">

<form
class="chat-form"
method="POST"
enctype="multipart/form-data"
>

<input
type="hidden"
name="sender"
id="senderInput"
>

<input
type="hidden"
name="sender_tg_id"
id="tgInput"
>

<label class="attach">

📎

<input
type="file"
name="image_file"
accept="image/*,video/*"
class="hidden"
>

</label>

<input
class="chat-input"
name="text"
placeholder="Message..."
autocomplete="off"
>

<button class="send-btn">
➤
</button>

</form>

</div>

<script>

const tg = window.Telegram?.WebApp;

if(tg){

tg.ready();
tg.expand();

const user = tg.initDataUnsafe?.user;

if(user){

document.getElementById("senderInput").value =
user.first_name || "Telegram User";

document.getElementById("tgInput").value =
user.id;

}

}

window.scrollTo(0, document.body.scrollHeight);

</script>

</body>
</html>
