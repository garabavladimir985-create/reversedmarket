<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chat</title>

<link rel="stylesheet" href="/static/css/style.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
background:#050816;
color:white;
font-family:Arial;
margin:0;
padding-bottom:125px;
}

.old-bottom-nav,
.bottom-nav,
.navbar{
display:none!important;
}

.chat-page{
padding:18px;
}

.chat-header h1{
color:#3ea6ff;
font-size:42px;
margin-bottom:24px;
}

.chat-box{
background:#111827;
border-radius:24px;
padding:18px;
min-height:350px;
margin-bottom:18px;
border:1px solid rgba(255,255,255,.06);
}

.message{
background:#0d1220;
border-radius:18px;
padding:12px;
margin-bottom:12px;
}

.message strong{
color:#3ea6ff;
}

.message img{
width:100%;
max-height:240px;
object-fit:cover;
border-radius:14px;
margin-top:10px;
}

.chat-form{
background:#111827;
border-radius:24px;
padding:16px;
border:1px solid rgba(255,255,255,.06);
}

.chat-form input,
.chat-form textarea{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:#0d1220;
color:white;
margin-bottom:12px;
font-size:15px;
box-sizing:border-box;
}

.chat-form textarea{
min-height:85px;
resize:none;
}

.chat-form button{
width:100%;
height:54px;
border:none;
border-radius:16px;
background:#3ea6ff;
color:white;
font-size:18px;
font-weight:800;
}

.premium-bottom-nav{
position:fixed!important;
bottom:0!important;
left:0!important;
transform:none!important;
width:100%!important;
max-width:100%!important;
height:86px!important;
background:rgba(17,24,39,.97)!important;
backdrop-filter:blur(20px)!important;
border-radius:24px 24px 0 0!important;
display:flex!important;
align-items:center!important;
justify-content:space-evenly!important;
padding:4px 2px!important;
z-index:999999!important;
box-shadow:0 -10px 40px rgba(0,0,0,.45)!important;
border:1px solid rgba(255,255,255,.06)!important;
overflow:hidden!important;
box-sizing:border-box!important;
}

.premium-nav-item{
display:flex!important;
flex-direction:column!important;
align-items:center!important;
justify-content:center!important;
gap:3px!important;
text-decoration:none!important;
color:#8d94a8!important;
font-size:9px!important;
font-weight:700!important;
min-width:40px!important;
}

.premium-nav-item.active{
color:#3ea6ff!important;
}

.premium-icon{
font-size:20px!important;
line-height:1!important;
}

.premium-shop-btn{
position:relative!important;
margin-top:-32px!important;
display:flex!important;
flex-direction:column!important;
align-items:center!important;
text-decoration:none!important;
color:#8d94a8!important;
font-size:9px!important;
font-weight:800!important;
min-width:54px!important;
}

.premium-shop-circle{
width:66px!important;
height:66px!important;
border-radius:50%!important;
background:#3ea6ff!important;
display:flex!important;
align-items:center!important;
justify-content:center!important;
font-size:30px!important;
color:white!important;
border:6px solid #050816!important;
box-shadow:0 0 35px rgba(62,166,255,.85)!important;
margin-bottom:4px!important;
}
</style>
</head>

<body>

<div class="chat-page">

<div class="chat-header">
<h1>CHAT</h1>
</div>

<div class="chat-box">

{% if messages|length == 0 %}
<div class="message">
No messages yet
</div>
{% endif %}

{% for message in messages %}
<div class="message">
<strong>{{ message.sender }}</strong>
<p>{{ message.text }}</p>

{% if message.image %}
<img src="{{ message.image }}">
{% endif %}
</div>
{% endfor %}

</div>

<form class="chat-form" method="POST" enctype="multipart/form-data">

<input name="sender" placeholder="Your name" value="Buyer">

<textarea name="text" placeholder="Message..."></textarea>

<input type="file" name="image_file">

<button type="submit">Send</button>

</form>

</div>

<div class="premium-bottom-nav">

<a href="/" class="premium-nav-item">
<div class="premium-icon">🏠</div>
<span>Главная</span>
</a>

<a href="/cart" class="premium-nav-item">
<div class="premium-icon">🛒</div>
<span>Корзина</span>
</a>

<a href="/favorites-products" class="premium-nav-item">
<div class="premium-icon">📁</div>
<span>Каталог</span>
</a>

<a href="/my-shop" class="premium-shop-btn">
<div class="premium-shop-circle">💎</div>
<span>ReversedShop</span>
</a>

<a href="/chat/general" class="premium-nav-item active">
<div class="premium-icon">💬</div>
<span>Чат</span>
</a>

<a href="/vip" class="premium-nav-item">
<div class="premium-icon">👑</div>
<span>Вип</span>
</a>

<a href="/profile" class="premium-nav-item">
<div class="premium-icon">👤</div>
<span>Профиль</span>
</a>

</div>

<script>
const tg = window.Telegram?.WebApp;
if(tg){
tg.ready();
tg.expand();
}
</script>

</body>
</html>
