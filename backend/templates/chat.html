<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chat</title>

<link rel="stylesheet" href="/static/css/style.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
background:#050816;
color:white;
font-family:Arial;
margin:0;
padding-bottom:145px;
}

.old-bottom-nav,
.bottom-nav,
.navbar{
display:none!important;
}

.chat-page{
padding:18px;
}

.chat-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:18px;
}

.chat-header h1{
color:#3ea6ff;
font-size:34px;
}

.chat-box{
background:#111827;
border-radius:24px;
padding:18px;
min-height:420px;
margin-bottom:18px;
border:1px solid rgba(255,255,255,.06);
}

.message{
background:#0d1220;
border-radius:18px;
padding:12px;
margin-bottom:12px;
}

.message strong{
color:#3ea6ff;
}

.message img{
width:100%;
max-height:260px;
object-fit:cover;
border-radius:14px;
margin-top:10px;
}

.chat-form{
background:#111827;
border-radius:24px;
padding:18px;
border:1px solid rgba(255,255,255,.06);
}

.chat-form input,
.chat-form textarea{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:#0d1220;
color:white;
margin-bottom:12px;
font-size:15px;
box-sizing:border-box;
}

.chat-form textarea{
min-height:90px;
resize:none;
}

.chat-form button{
width:100%;
height:56px;
border:none;
border-radius:16px;
background:#3ea6ff;
color:white;
font-size:18px;
font-weight:800;
}

.premium-bottom-nav{
position:fixed!important;
bottom:0!important;
left:50%!important;
transform:translateX(-50%)!important;
width:100%!important;
max-width:900px!important;
height:105px!important;
background:rgba(17,24,39,.96)!important;
backdrop-filter:blur(20px)!important;
border-top-left-radius:34px!important;
border-top-right-radius:34px!important;
display:flex!important;
align-items:center!important;
justify-content:space-around!important;
padding:8px 12px!important;
z-index:999999!important;
box-shadow:0 -10px 40px rgba(0,0,0,.45)!important;
border:1px solid rgba(255,255,255,.06)!important;
}

.premium-nav-item{
display:flex!important;
flex-direction:column!important;
align-items:center!important;
justify-content:center!important;
gap:5px!important;
text-decoration:none!important;
color:#8d94a8!important;
font-size:13px!important;
font-weight:700!important;
min-width:58px!important;
}

.premium-nav-item.active{
color:#3ea6ff!important;
}

.premium-icon{
font-size:28px!important;
line-height:1!important;
}

.premium-shop-btn{
position:relative!important;
margin-top:-45px!important;
display:flex!important;
flex-direction:column!important;
align-items:center!important;
text-decoration:none!important;
color:#8d94a8!important;
font-size:12px!important;
font-weight:800!important;
min-width:82px!important;
}

.premium-shop-circle{
width:88px!important;
height:88px!important;
border-radius:50%!important;
background:#3ea6ff!important;
display:flex!important;
align-items:center!important;
justify-content:center!important;
font-size:42px!important;
color:white!important;
border:8px solid #050816!important;
box-shadow:0 0 35px rgba(62,166,255,.85)!important;
margin-bottom:5px!important;
}
</style>
</head>

<body>

<div class="chat-page">

    <div class="chat-header">
        <h1>CHAT</h1>
        <a href="/">🏠</a>
    </div>

    <div class="chat-box">

        {% if messages|length == 0 %}
        <div class="message">
            No messages yet
        </div>
        {% endif %}

        {% for message in messages %}
        <div class="message">
            <strong>{{ message.sender }}</strong>
            <p>{{ message.text }}</p>

            {% if message.image %}
            <img src="{{ message.image }}">
            {% endif %}
        </div>
        {% endfor %}

    </div>

    <form class="chat-form" method="POST" enctype="multipart/form-data">

        <input name="sender" placeholder="Your name" value="Buyer">

        <textarea name="text" placeholder="Message..."></textarea>

        <input type="file" name="image_file">

        <button type="submit">
            Send Message
        </button>

    </form>

</div>

<div class="premium-bottom-nav">

    <a href="/" class="premium-nav-item">
        <div class="premium-icon">🏠</div>
        <span>Главная</span>
    </a>

    <a href="/cart" class="premium-nav-item">
        <div class="premium-icon">🛒</div>
        <span>Корзина</span>
    </a>

    <a href="/favorites-products" class="premium-nav-item">
        <div class="premium-icon">📁</div>
        <span>Каталог</span>
    </a>

    <a href="/my-shop" class="premium-shop-btn">
        <div class="premium-shop-circle">💎</div>
        <span>ReversedShop</span>
    </a>

    <a href="/chat" class="premium-nav-item active">
        <div class="premium-icon">💬</div>
        <span>Чат</span>
    </a>

    <a href="/vip" class="premium-nav-item">
        <div class="premium-icon">👑</div>
        <span>Вип</span>
    </a>

    <a href="/profile" class="premium-nav-item">
        <div class="premium-icon">👤</div>
        <span>Профиль</span>
    </a>

</div>

<script>
const tg = window.Telegram?.WebApp;

if(tg){
    tg.ready();
    tg.expand();
}
</script>

</body>
</html>
