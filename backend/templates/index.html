<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReversedMarket</title>

    <link rel="stylesheet" href="/static/css/style.css">

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<div class="topbar">

    <div class="logo">
        REVERSED<span>MARKET</span>
    </div>

    <div class="menu-btn">
        ☰
    </div>

</div>

<div class="search-box">
    <input type="text" placeholder="Search shop...">
</div>

<div class="top-actions">

    <a href="/favorites" class="action-btn">
        ❤️
    </a>

    <a href="/vip" class="action-btn gold">
        ⭐
    </a>

</div>

<div class="products-grid">

{% for seller in sellers %}

<a class="product-card" href="/shop/{{ seller.id }}">

    <img src="{{ seller.avatar }}" class="product-image">

    <div class="product-info">

        <h3>{{ seller.shop_name }}</h3>

        <p class="product-category">
            {{ seller.category }}
        </p>

        <p class="product-description">
            {{ seller.description }}
        </p>

    </div>

</a>

{% endfor %}

</div>

<a href="/my-shop" class="my-shop-float">
    🏪
</a>

<div class="bottom-nav">

    <a href="/" class="nav-item active">
        <div>🏠</div>
        <span>HOME</span>
    </a>

    <a href="/seller" class="nav-item">
        <div>🏪</div>
        <span>SELLER</span>
    </a>

    <a href="/chat" class="nav-item">
        <div>💬</div>
        <span>CHAT</span>
    </a>

    <a href="/cart" class="nav-item">
        <div>🛒</div>
        <span>CART</span>
    </a>

    <a href="/profile" class="nav-item">
        <div>👤</div>
        <span>LOGIN</span>
    </a>

</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
</script>

</body>
</html>
