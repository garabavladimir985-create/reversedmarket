<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReversedMarket</title>
<link rel="stylesheet" href="/static/css/style.css?v=7000">
</head>
<body>

<div class="app-page">

    <div class="brand">REVERSED<span>MARKET</span></div>

    <div class="search-row">
        <form action="/search">
            <input class="input" name="q" placeholder="Search shop...">
        </form>

        <a href="/favorites-products" class="square-btn active">❤️</a>
        <a href="/catalog" class="square-btn">⭐</a>
    </div>

    <div class="section-title">Latest Items</div>

    {% if products|length == 0 %}
        <div class="empty-box">No items yet</div>
    {% else %}
        <div class="products-grid">
            {% for product in products %}
            <div class="product-card fav-wrapper">

                <button
                    class="fav-btn"
                    onclick="toggleFavorite(event, '{{ product.id }}', '{{ product.name }}', '{{ product.price }}', '{{ product.image }}')"
                    id="fav-{{ product.id }}"
                >
                    ♡
                </button>

                <a href="/product/{{ product.id }}">
                    <img src="{{ product.image }}">
                    <div class="product-info">
                        <div class="product-name">{{ product.name }}</div>
                        <div class="product-price">€{{ product.price }}</div>
                    </div>
                </a>

            </div>
            {% endfor %}
        </div>
    {% endif %}

</div>

{% include "_nav.html" %}

<script>
function getFavorites(){
    return JSON.parse(localStorage.getItem("favorites") || "[]");
}

function saveFavorites(favs){
    localStorage.setItem("favorites", JSON.stringify(favs));
}

function toggleFavorite(event, id, name, price, image){
    event.preventDefault();
    event.stopPropagation();

    let favs = getFavorites();
    const exists = favs.find(item => String(item.id) === String(id));

    if(exists){
        favs = favs.filter(item => String(item.id) !== String(id));
    }else{
        favs.push({
            id:id,
            name:name,
            price:price,
            image:image
        });
    }

    saveFavorites(favs);
    updateFavButtons();
}

function updateFavButtons(){
    const favs = getFavorites();

    favs.forEach(item => {
        const btn = document.getElementById("fav-" + item.id);
        if(btn){
            btn.innerText = "❤️";
            btn.classList.add("active");
        }
    });

    document.querySelectorAll(".fav-btn").forEach(btn => {
        const id = btn.id.replace("fav-", "");
        const exists = favs.find(item => String(item.id) === String(id));

        if(!exists){
            btn.innerText = "♡";
            btn.classList.remove("active");
        }
    });
}

updateFavButtons();
</script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script>
const tg = window.Telegram?.WebApp;

if(tg){
    tg.ready();
    tg.expand();

    const user = tg.initDataUnsafe?.user;

    if(user){
        fetch("/api/telegram-auth", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify(user)
        });
    }
}
</script>
</body>
</html>
