<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReversedMarket</title>
<link rel="stylesheet" href="/static/css/style.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

<div class="market-header">
    <div class="brand">REVERSED<span>MARKET</span></div>
    <a class="menu-btn" href="/my-shop">☰</a>
</div>

<div class="shop-search-row">
    <form action="/search" class="shop-search">
        <input name="q" placeholder="Search shop...">
    </form>

    <a class="filter active" href="/favorites">❤️</a>
    <a class="filter" href="/vip">⭐</a>
</div>

{% for product in products %}

<div class="product-card">

    <a href="/product/{{ product.id }}">

        <img class="product-image" src="{{ product.image }}">

        <div class="product-info">

            <div class="product-name">
                {{ product.name }}
            </div>

            <div class="product-price">
                ${{ product.price }}
            </div>

            <div class="product-brand">
                {{ product.brand }}
            </div>

        </div>

    </a>

</div>

{% endfor %}

{% for seller in sellers %}
<div class="shop-card">

    <button class="favorite-btn">❤️</button>

    <a href="/shop/{{ seller.id }}">
        <img src="{{ seller.avatar }}">

        <h2>{{ seller.shop_name }}</h2>

        <div class="stats">
            ⭐ {{ seller.rating }} · ❤️ {{ seller.likes }}
        </div>

        <div class="stock">
            {{ seller.category }}
        </div>
    </a>

</div>
{% endfor %}

</div>

<a href="/my-shop" class="my-shop-float">🏪</a>

<div class="navbar">
    <a href="/">🏠<small>HOME</small></a>
    <a href="/my-shop">🏪<small>MY SHOP</small></a>
    <a href="/chat">💬<small>CHAT</small></a>
    <a href="/cart">🛒<small>CART</small></a>
    <a href="/profile">👤<small>LOGIN</small></a>
</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) {
    tg.ready();
    tg.expand();
}
</script>

</body>
</html>
